<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STRIKER – Email Queue</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0c0f;--surface:#111418;--border:#1e2530;--accent:#ff5c00;--accent2:#ffaa00;--text:#e8eaed;--muted:#6b7280;--ok:#00cc88;--err:#ff3333}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;padding:1.5rem;max-width:720px;margin:0 auto}
    h1{font-size:1rem;letter-spacing:4px;color:var(--accent);margin-bottom:.2rem;text-transform:uppercase}
    .sub{font-size:.6rem;color:var(--muted);margin-bottom:1.5rem;letter-spacing:1px}
    #status-bar{font-size:.65rem;color:var(--muted);margin-bottom:1rem;padding:.45rem .8rem;background:var(--surface);border:1px solid var(--border);border-radius:2px}
    .section-title{font-size:.58rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin:1.5rem 0 .6rem;border-bottom:1px solid var(--border);padding-bottom:.3rem}

    .draft{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent2);border-radius:2px;padding:1rem;margin-bottom:.6rem;transition:opacity .4s,transform .4s}
    .draft.sending{opacity:.6;pointer-events:none}
    .draft.done{opacity:0;transform:translateX(20px)}
    .draft.is-error{border-left-color:var(--err)}

    .dname{font-size:.85rem;font-weight:600;color:var(--accent2);margin-bottom:.2rem}
    .dmeta{font-size:.6rem;color:var(--muted);margin-bottom:.75rem}
    .emsg{font-size:.62rem;color:var(--err);margin-bottom:.6rem;padding:.35rem .5rem;background:rgba(255,51,51,.08);border-radius:2px}

    .field-label{font-size:.55rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:.25rem}
    .dsubject{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:.72rem;padding:.4rem .6rem;border-radius:2px;outline:none;margin-bottom:.6rem}
    .dsubject:focus{border-color:var(--accent2)}
    .dbody{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:.65rem;padding:.5rem .6rem;border-radius:2px;outline:none;resize:vertical;min-height:180px;line-height:1.65;margin-bottom:.75rem}
    .dbody:focus{border-color:var(--accent2)}

    .dbtns{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
    .abtn{font-size:.65rem;letter-spacing:1px;text-transform:uppercase;padding:.35rem .9rem;border:none;background:var(--ok);color:#0a0c0f;cursor:pointer;border-radius:2px;font-family:inherit;font-weight:600;transition:background .15s}
    .abtn:hover:not(:disabled){background:#00ffaa}
    .abtn:disabled{background:#1a3a1a;color:var(--ok);cursor:default}
    .rbtn{font-size:.65rem;letter-spacing:1px;text-transform:uppercase;padding:.35rem .7rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:2px;font-family:inherit;transition:all .15s}
    .rbtn:hover{border-color:var(--err);color:var(--err)}
    .stag{font-size:.55rem;letter-spacing:1px;text-transform:uppercase;padding:.1rem .35rem;border-radius:2px;margin-left:.4rem;vertical-align:middle}
    .stag.pending{background:rgba(255,170,0,.15);color:var(--accent2)}
    .stag.sending{background:rgba(255,170,0,.3);color:var(--accent2)}
    .stag.error{background:rgba(255,51,51,.15);color:var(--err)}
    .emsg-live{font-size:.6rem;color:var(--err);margin-top:.5rem;display:none}

    .hist-item{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--ok);padding:.55rem .8rem;margin-bottom:.35rem;border-radius:2px;cursor:pointer}
    .hist-item.open .hist-body{display:block}
    .hist-name{font-size:.75rem;color:var(--ok);font-weight:600;margin-bottom:.1rem}
    .hist-meta{font-size:.58rem;color:var(--muted)}
    .hist-body{display:none;margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--border);font-size:.62rem;color:#aaa;white-space:pre-wrap;line-height:1.6;max-height:120px;overflow-y:auto}
    .empty{text-align:center;padding:2rem;color:var(--muted);font-size:.72rem}
  </style>
</head>
<body>
  <h1>STRIKER · EMAIL QUEUE</h1>
  <div class="sub">Schvaľovanie a odosielanie emailov · real-time</div>
  <div id="status-bar">Načítavam...</div>

  <div class="section-title">Čakajú na schválenie</div>
  <div id="pending-list"></div>

  <div class="section-title">História odoslaných</div>
  <div id="history-list"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import {
      getFirestore, collection, query, where,
      onSnapshot, doc, updateDoc, serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const statusBar = document.getElementById('status-bar');
    const pendingList = document.getElementById('pending-list');
    const historyList = document.getElementById('history-list');

    let cfg;
    try {
      const res = await fetch('/.netlify/functions/get-config');
      cfg = await res.json();
    } catch {
      statusBar.textContent = '❌ Nepodarilo sa načítať konfiguráciu.';
      throw new Error('Config load failed');
    }

    const app = initializeApp(cfg);
    const db = getFirestore(app);

    function formatTs(ts) {
      if (!ts) return '–';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('sk-SK') + ' ' + d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
    }

    // Live: pending + error (errors stay visible for retry)
    const pendingQ = query(collection(db, 'contact_queue'), where('status', 'in', ['pending', 'error']));
    onSnapshot(pendingQ, snap => {
      if (snap.empty) {
        pendingList.innerHTML = '<div class="empty">✅ Žiadne čakajúce drafty</div>';
        statusBar.textContent = 'Všetky emaily spracované.';
      } else {
        statusBar.textContent = `Čakajú na schválenie: ${snap.size}`;
        pendingList.innerHTML = '';
        snap.forEach(docSnap => renderDraft(docSnap));
      }
    }, err => {
      statusBar.textContent = '❌ Firestore chyba: ' + err.message;
    });

    // Live: historia odoslanych, zoradena od najnovsich
    const histQ = query(collection(db, 'contact_queue'), where('status', '==', 'sent'));
    onSnapshot(histQ, snap => {
      if (snap.empty) {
        historyList.innerHTML = '<div class="empty">Zatiaľ žiadna história</div>';
        return;
      }
      const docs = [];
      snap.forEach(d => docs.push({ id: d.id, ...d.data() }));
      docs.sort((a, b) => {
        const ta = a.sentAt?.toDate?.() || new Date(0);
        const tb = b.sentAt?.toDate?.() || new Date(0);
        return tb - ta;
      });
      historyList.innerHTML = '';
      docs.slice(0, 30).forEach(d => {
        const div = document.createElement('div');
        div.className = 'hist-item';
        div.innerHTML = `
          <div class="hist-name">✓ ${d.contactName}</div>
          <div class="hist-meta">${d.to} · ${formatTs(d.sentAt)} · ${d.createdBy || '–'}</div>
          <div class="hist-body">${d.sentBody || d.body || '–'}</div>
        `;
        div.addEventListener('click', () => div.classList.toggle('open'));
        historyList.appendChild(div);
      });
    });

    function renderDraft(docSnap) {
      const d = docSnap.data();
      const isError = d.status === 'error';
      const div = document.createElement('div');
      div.className = 'draft' + (isError ? ' is-error' : '');

      div.innerHTML = `
        <div class="dname">${d.contactName} <span class="stag ${isError ? 'error' : 'pending'}">${isError ? 'error' : 'pending'}</span></div>
        <div class="dmeta">→ ${d.to} · ${d.type === 'hotel' ? 'Hotel' : 'Práčovňa'} · ${d.createdBy || '–'} · ${formatTs(d.createdAt)}</div>
        ${isError ? `<div class="emsg">⚠ ${d.errorMsg || 'Neznáma chyba'}</div>` : ''}
        <div class="field-label">Predmet</div>
        <input class="dsubject" type="text" value="${(d.subject || '').replace(/"/g, '&quot;')}">
        <div class="field-label">Text emailu</div>
        <textarea class="dbody">${d.body || ''}</textarea>
        <div class="dbtns">
          <button class="abtn">${isError ? '↺ Skúsiť znova' : '✓ Schváliť &amp; Odoslať'}</button>
          <button class="rbtn">✕ Zamietnuť</button>
        </div>
        <div class="emsg-live"></div>
      `;

      const abtn = div.querySelector('.abtn');
      const rbtn = div.querySelector('.rbtn');
      const subjEl = div.querySelector('.dsubject');
      const bodyEl = div.querySelector('.dbody');
      const emsgLive = div.querySelector('.emsg-live');
      const stag = div.querySelector('.stag');

      abtn.addEventListener('click', async () => {
        const subject = subjEl.value.trim();
        const message = bodyEl.value.trim();

        if (!subject || !message) {
          emsgLive.textContent = '⚠ Predmet a text nesmú byť prázdne.';
          emsgLive.style.display = 'block';
          return;
        }

        abtn.textContent = '⏳ Odosiela sa...';
        abtn.disabled = true;
        rbtn.disabled = true;
        subjEl.disabled = true;
        bodyEl.disabled = true;
        div.classList.add('sending');
        stag.textContent = 'sending';
        stag.className = 'stag sending';
        emsgLive.style.display = 'none';

        try {
          const res = await fetch('/.netlify/functions/send-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ to: d.to, subject, message })
          });
          const result = await res.json();
          if (!result.success) throw new Error(result.error || 'Neznáma chyba servera');

          // Uloz aj finálny odoslaný text do histórie
          await updateDoc(doc(db, 'contact_queue', docSnap.id), {
            status: 'sent',
            approved: true,
            sentAt: serverTimestamp(),
            sentSubject: subject,
            sentBody: message
          });

          try {
            await updateDoc(doc(db, 'striker', 'crm'), {
              [`${d.contactId}.emailStatus`]: 'sent',
              [`${d.contactId}.emailSentAt`]: new Date().toISOString()
            });
          } catch {}

          div.classList.remove('sending');
          div.classList.add('done');
          setTimeout(() => div.remove(), 450);

        } catch (err) {
          await updateDoc(doc(db, 'contact_queue', docSnap.id), {
            status: 'error',
            errorMsg: err.message
          });
          try {
            await updateDoc(doc(db, 'striker', 'crm'), {
              [`${d.contactId}.emailStatus`]: 'error'
            });
          } catch {}

          div.classList.remove('sending');
          subjEl.disabled = false;
          bodyEl.disabled = false;
          stag.textContent = 'error';
          stag.className = 'stag error';
          emsgLive.textContent = '⚠ ' + err.message;
          emsgLive.style.display = 'block';
          abtn.textContent = '↺ Skúsiť znova';
          abtn.disabled = false;
          rbtn.disabled = false;
        }
      });

      rbtn.addEventListener('click', async () => {
        if (!confirm('Zamietnuť tento draft?')) return;
        await updateDoc(doc(db, 'contact_queue', docSnap.id), { status: 'rejected' });
        try {
          await updateDoc(doc(db, 'striker', 'crm'), {
            [`${d.contactId}.emailStatus`]: ''
          });
        } catch {}
        div.classList.add('done');
        setTimeout(() => div.remove(), 450);
      });

      pendingList.appendChild(div);
    }
  </script>
</body>
</html>
