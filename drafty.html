<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STRIKER – Drafty schválenie</title>
  <style>
    body { font-family: sans-serif; background: #0f0f0f; color: #eee; padding: 20px; }
    h1 { color: #f90; }
    .draft { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 16px; margin-bottom: 16px; transition: opacity 0.5s; }
    .draft h3 { margin: 0 0 8px; color: #f90; }
    .draft p { margin: 4px 0; font-size: 14px; white-space: pre-wrap; }
    .label { color: #aaa; font-size: 12px; }
    button { margin-top: 12px; padding: 10px 20px; background: #f90; color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    button:disabled { background: #555; color: #999; cursor: default; }
    #status { margin-bottom: 20px; color: #aaa; }
  </style>
</head>
<body>
  <h1>📋 STRIKER Drafty</h1>
  <div id="status">Načítavam konfiguráciu...</div>
  <div id="drafts-container"></div>

  <script type="module">
    // 1. Config cez Netlify funkciu
    let firebaseConfig;
    try {
      const res = await fetch('/.netlify/functions/get-config');
      firebaseConfig = await res.json();
    } catch (e) {
      document.getElementById('status').textContent = '❌ Chyba: nepodarilo sa načítať config.';
      throw e;
    }

    // 2. Inicializuj Firebase
    const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const { getFirestore, collection, getDocs, doc, updateDoc, query, where } =
      await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 3. Načítaj iba neschválené drafty
    const statusEl = document.getElementById('status');
    const container = document.getElementById('drafts-container');

    statusEl.textContent = 'Načítavam drafty...';

    let snapshot;
    try {
      const q = query(collection(db, 'contact_queue'), where('approved', '==', false));
      snapshot = await getDocs(q);
    } catch (e) {
      statusEl.textContent = '❌ Chyba pri načítaní Firestore.';
      throw e;
    }

    if (snapshot.empty) {
      statusEl.textContent = '✅ Žiadne čakajúce drafty.';
    } else {
      statusEl.textContent = `Čakajú na schválenie: ${snapshot.size}`;
    }

    // 4. Zobraz každý draft
    snapshot.forEach(docSnap => {
      const d = docSnap.data();
      const div = document.createElement('div');
      div.className = 'draft';
      div.innerHTML = `
        <h3>${d.company || d.name || docSnap.id}</h3>
        <p><span class="label">Email:</span> ${d.email || '–'}</p>
        <p><span class="label">Správa:</span>\n${d.body || d.message || d.text || '–'}</p>
        <p><span class="label">Stav:</span> ⏳ Čaká na schválenie</p>
      `;

      const btn = document.createElement('button');
      btn.textContent = '✅ Schváliť';
      btn.onclick = async () => {
        btn.disabled = true;
        btn.textContent = 'Ukladám...';
        try {
          await updateDoc(doc(db, 'contact_queue', docSnap.id), { approved: true });
          // Karta zmizne plynule
          div.style.opacity = '0';
          setTimeout(() => div.remove(), 500);
          // Aktualizuj počítadlo
          const remaining = container.querySelectorAll('.draft').length - 1;
          statusEl.textContent = remaining > 0
            ? `Čakajú na schválenie: ${remaining}`
            : '✅ Všetky drafty schválené.';
        } catch (e) {
          btn.textContent = '❌ Chyba – skús znova';
          btn.disabled = false;
        }
      };
      div.appendChild(btn);
      container.appendChild(div);
    });
  </script>
</body>
</html>
