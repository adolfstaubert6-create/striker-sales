<style>
  :root {
    --bg: #0a0c0f; --surface: #111418; --border: #1e2530;

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; }

  #setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; text-align: center; }
  .setup-logo { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 4px; color: var(--accent); }
  .setup-logo span { color: var(--accent2); }
  .setup-desc { color: var(--muted); font-size: 0.85rem; margin: 1rem 0 2rem; line-height: 1.6; max-width: 320px; }
  .setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 1.5rem; width: 100%; max-width: 340px; }
  .setup-card h3 { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
  .setup-btn { width: 100%; background: var(--accent); border: none; color: white; font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; padding: 0.7rem; cursor: pointer; border-radius: 2px; margin-bottom: 0.5rem; transition: opacity 0.2s; }
  .setup-btn:hover { opacity: 0.85; }
  .setup-btn.sec { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .setup-btn.sec:hover { border-color: var(--accent2); color: var(--accent2); }
  .setup-divider { color: var(--muted); font-size: 0.7rem; margin: 0.75rem 0; font-family: 'IBM Plex Mono', monospace; }
  .setup-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; padding: 0.6rem 0.8rem; border-radius: 2px; outline: none; margin-bottom: 0.75rem; }
  .setup-input:focus { border-color: var(--accent); }

  #app { display: none; }
  header { padding: 1.2rem 1.2rem 0.8rem; border-bottom: 1px solid var(--border); background: #0a0c0f; display: flex; justify-content: space-between; align-items: flex-start; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 3px; color: var(--accent); line-height: 1; }
  .logo span { color: var(--accent2); }
  .subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; color: var(--muted); margin-top: 0.15rem; }
  .sync-area { text-align: right; font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--waescherei); display: inline-block; margin-right: 3px; vertical-align: middle; }
  .sync-dot.pulse { animation: pulse 1s infinite; background: var(--accent2); }
  .sync-dot.err { background: #ff3333; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.2} }
  .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem; padding: 0.2rem 0.4rem; cursor: pointer; border-radius: 2px; margin-top: 0.4rem; }

  .controls { padding: 0.7rem 1.2rem; display: flex; gap: 0.5rem; flex-wrap: wrap; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 10; }
  .filter-btn { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; letter-spacing: 1px; padding: 0.3rem 0.7rem; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; text-transform: uppercase; transition: all 0.15s; border-radius: 2px; }

let user = '', sharedData = {}, filter = 'all', search = '';

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function setSS(type, txt) {
  const d = document.getElementById('sdot'), t = document.getElementById('stxt');
  if (!d) return;
  d.className = 'sync-dot' + (type==='s'?' pulse':type==='e'?' err':'');
  t.textContent = txt;
  t.style.color = type==='e'?'#ff3333':type==='s'?'var(--accent2)':'var(--waescherei)';
}

// Firestore realtime listener
function startSync() {
  setSS('s', 'Verbinde...');
  const docRef = doc(db, 'striker', 'crm');
  onSnapshot(docRef, (snap) => {
    if (snap.exists()) {
      sharedData = snap.data() || {};
    } else {
      sharedData = {};
    }
    setSS('ok', 'Live ●');
    document.getElementById('stime').textContent = new Date().toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'});
    render();
  }, (err) => {
    setSS('e', 'Fehler');
    console.error(err);
  });
}

async function saveToFirebase(id, data) {
  setSS('s', 'Speichern...');
  try {
    const docRef = doc(db, 'striker', 'crm');
    await setDoc(docRef, { [id]: data }, { merge: true });
  } catch(e) {
    setSS('e', 'Fehler');
    toast('⚠ Speichern fehlgeschlagen');
  }
}

window.startAs = function(name) {
  user = name;
  localStorage.setItem('striker-user', name);
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('ulabel').textContent = name;
  startSync();
};

window.startCustom = function() {
  const n = document.getElementById('cname').value.trim();
  if (n) window.startAs(n);
};

window.logout = function() {
  localStorage.removeItem('striker-user');
  document.getElementById('setup-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
};

async function setStatus(id, s) {
  const cur = sharedData[id]?.status || '';
  const newStatus = cur === s ? '' : s;
  const data = { ...sharedData[id], status: newStatus, who: user, ts: Date.now() };
  await saveToFirebase(id, data);
}

async function setNotes(id, notes) {
  const data = { ...sharedData[id], notes, noteWho: user };
  await saveToFirebase(id, data);
  toast('✓ Notiz gespeichert');
}

function render() {
  const list = document.getElementById('list');
  if (!list) return;
  let arr = contacts.filter((c) => {
    if (filter !== 'all' && c.t !== filter) return false;
    if (search) { const q = search.toLowerCase(); return c.n.toLowerCase().includes(q) || c.c.toLowerCase().includes(q); }
    return true;
  });
  const hotels = arr.filter(c => c.t === 'hotel');
  const waesch = arr.filter(c => c.t === 'waescherei');
  let html = '';
  if (hotels.length) { html += `<div class="sec-label">Hotels (${hotels.length})</div>`; hotels.forEach(c => html += cardHtml(c)); }
  if (waesch.length) { html += `<div class="sec-label">Wäschereien (${waesch.length})</div>`; waesch.forEach(c => html += cardHtml(c)); }
  if (!html) html = '<div style="text-align:center;padding:2.5rem;color:var(--muted);font-size:0.8rem">Keine Ergebnisse</div>';
  list.innerHTML = html;

  list.querySelectorAll('.card-left').forEach(el => el.addEventListener('click', () => el.closest('.card').classList.toggle('open')));
  list.querySelectorAll('.sb').forEach(btn => btn.addEventListener('click', e => { e.stopPropagation(); setStatus(btn.dataset.id, btn.dataset.s); }));
  list.querySelectorAll('.save-btn').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const ta = list.querySelector(`.notes-area[data-id="${btn.dataset.id}"]`);
    setNotes(btn.dataset.id, ta.value);
  }));
  list.querySelectorAll('.notes-area').forEach(ta => ta.addEventListener('click', e => e.stopPropagation()));
}

async function sendEmail(id) {
  const c = contacts[parseInt(id)];
  const tpl = getEmailTemplate(c);
  
  // Show sending status
  const btn = document.querySelector(`.email-btn[data-id="${id}"]`);
  if (btn) {
    btn.textContent = '⏳ Odosiela sa...';
    btn.disabled = true;
  }

  try {
    const response = await fetch('/.netlify/functions/send-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        to: c.e,
        subject: tpl.subject,
        text: tpl.body,
        companyType: c.t
      })
    });

    const result = await response.json();

    if (response.ok && result.success) {
      toast('✓ Email odoslaný na ' + c.e);
      // Auto-set status to kontaktovaný
      await setStatus(id, 'k');
      if (btn) {
        btn.textContent = '✓ Email odoslaný';
        btn.style.background = 'rgba(0,204,136,0.2)';
        btn.style.color = 'var(--waescherei)';
      }
    } else {
      toast('⚠ Chyba: ' + (result.error || 'Neznáma chyba'));
      if (btn) {
        btn.textContent = '📧 Email odoslať (' + (c.t === 'hotel' ? 'Hotel' : 'Práčovňa') + ')';
        btn.disabled = false;
      }
    }
  } catch (err) {
    toast('⚠ Spojenie zlyhalo');
    if (btn) {
      btn.textContent = '📧 Email odoslať (' + (c.t === 'hotel' ? 'Hotel' : 'Práčovňa') + ')';
      btn.disabled = false;
    }
  }
}

function cardHtml(c) {
  const id = contacts.indexOf(c).toString();
  const d = sharedData[id] || {};
  const st = d.status || '';
  const notes = d.notes || '';
  const who = d.who || '';
  const sBadge = st ? `<span class="s-badge s-${st}">${st==='k'?'Kontaktiert':st==='a'?'Angebot':'Abgeschl.'}</span>` : '';
  const emailLabel = c.t === 'hotel' ? '📧 Email odoslať (Hotel)' : '📧 Email odoslať (Práčovňa)';
  return `<div class="card ${c.t}">
    <div class="card-left">
      <div class="card-name">${c.n}${sBadge}</div>
      <div class="card-city">${c.c}</div>
      <div class="card-details">
        <div class="detail-row"><strong>Adresa</strong><br>${c.a}</div>
        <div class="detail-row"><strong>Tel</strong><br><a href="tel:${c.p}">${c.p}</a></div>
        <div class="detail-row"><strong>E-Mail</strong><br><a href="mailto:${c.e}">${c.e}</a></div>
        <div class="detail-row"><strong>Web</strong><br><a href="https://${c.w}" target="_blank">${c.w}</a></div>
        <button class="email-btn" data-id="${id}" onclick="sendEmail('${id}'); event.stopPropagation();">${emailLabel}</button>
        <div class="status-row">
          <button class="sb ${st==='k'?'active-k':''}" data-id="${id}" data-s="k">Kontaktovaný</button>
          <button class="sb ${st==='a'?'active-a':''}" data-id="${id}" data-s="a">Ponuka</button>
          <button class="sb ${st==='x'?'active-x':''}" data-id="${id}" data-s="x">Uzavreté</button>
        </div>
        ${who ? `<div class="who-line">Status: ${who}</div>` : ''}
        <textarea class="notes-area" data-id="${id}" placeholder="Poznámky...">${notes}</textarea>
        <button class="save-btn" data-id="${id}">Uložiť poznámku</button>
      </div>
    </div>
    <span class="badge ${c.t}">${c.t==='hotel'?'Hotel':'Práč.'}</span>
  </div>`;
}

document.getElementById('search').addEventListener('input', e => { search = e.target.value; render(); });
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); filter = btn.dataset.f; render();
  });
});
document.getElementById('cname').addEventListener('keydown', e => { if (e.key==='Enter') window.startCustom(); });

const su = localStorage.getItem('striker-user');
if (su) window.startAs(su);
