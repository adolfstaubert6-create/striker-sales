<style>
:root{--bg:#0a0c0f;--surface:#111418;--border:#1e2530;--accent:#ff5c00;--accent2:#ffaa00;--text:#e8eaed;--muted:#6b7280;--hotel:#0066ff;--waescherei:#00cc88}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh}
#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center}
.logo{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:4px;color:var(--accent)}
.logo span{color:var(--accent2)}
.desc{color:var(--muted);font-size:.85rem;margin:1rem 0 2rem;line-height:1.6;max-width:320px}
.card-setup{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1.5rem;width:100%;max-width:340px}
.card-setup h3{font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
.sbtn{width:100%;background:var(--accent);border:none;color:white;font-family:'IBM Plex Mono',monospace;font-size:.8rem;letter-spacing:2px;text-transform:uppercase;padding:.7rem;cursor:pointer;border-radius:2px;margin-bottom:.5rem}
.sbtn.sec{background:transparent;border:1px solid var(--border);color:var(--muted)}
.sdiv{color:var(--muted);font-size:.7rem;margin:.75rem 0;font-family:'IBM Plex Mono',monospace}
.sinp{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:.85rem;padding:.6rem .8rem;border-radius:2px;outline:none;margin-bottom:.75rem}
#app{display:none}
header{padding:1.2rem;border-bottom:1px solid var(--border);background:#0a0c0f;display:flex;justify-content:space-between;align-items:flex-start}
.hlogo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:3px;color:var(--accent);line-height:1}
.hlogo span{color:var(--accent2)}
.hsub{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--muted);margin-top:.15rem}
.sync{text-align:right;font-family:'IBM Plex Mono',monospace;font-size:.62rem}
.dot{width:7px;height:7px;border-radius:50%;background:var(--waescherei);display:inline-block;margin-right:3px;vertical-align:middle}
.dot.pulse{animation:pulse 1s infinite;background:var(--accent2)}
.dot.err{background:#ff3333}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.lbtn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:.58rem;padding:.2rem .4rem;cursor:pointer;border-radius:2px;margin-top:.4rem}
.controls{padding:.7rem 1.2rem;display:flex;gap:.5rem;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10}
.fbtn{font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:1px;padding:.3rem .7rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;text-transform:uppercase;transition:all .15s;border-radius:2px}
.fbtn.active{border-color:var(--accent);color:var(--accent)}
.fbtn.fh.active{border-color:var(--hotel);color:var(--hotel)}
.fbtn.fw.active{border-color:var(--waescherei);color:var(--waescherei)}
.sinput{flex:1;min-width:130px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:.72rem;padding:.3rem .6rem;border-radius:2px;outline:none}
.sinput::placeholder{color:var(--muted)}
.list{padding:.6rem 1.2rem}
.slabel{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);padding:.7rem 0 .35rem}
.contact{background:var(--surface);border:1px solid var(--border);border-left:3px solid transparent;padding:.8rem .9rem;margin-bottom:.35rem;border-radius:2px;display:flex;justify-content:space-between;align-items:flex-start;gap:.7rem}
.contact.hotel{border-left-color:var(--hotel)}
.contact.waescherei{border-left-color:var(--waescherei)}
.contact.open{background:#161b22}
.cleft{flex:1;cursor:pointer}
.cname{font-weight:600;font-size:.88rem;margin-bottom:.12rem}
.ccity{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--muted)}
.cbadge{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:1px;text-transform:uppercase;padding:.12rem .4rem;border-radius:2px;white-space:nowrap}
.cbadge.hotel{background:rgba(0,102,255,.15);color:var(--hotel)}
.cbadge.waescherei{background:rgba(0,204,136,.15);color:var(--waescherei)}
.sbadge{font-family:'IBM Plex Mono',monospace;font-size:.55rem;letter-spacing:1px;text-transform:uppercase;padding:.1rem .35rem;border-radius:2px;margin-left:.3rem;vertical-align:middle}
.sk{background:rgba(0,102,255,.15);color:#0066ff}
.sa{background:rgba(204,0,255,.15);color:#cc00ff}
.sx{background:rgba(0,204,136,.15);color:var(--waescherei)}
.cdetails{display:none;margin-top:.6rem;padding-top:.6rem;border-top:1px solid var(--border);font-size:.78rem;color:var(--muted);line-height:1.7}
.contact.open .cdetails{display:block}
.cdetails a{color:var(--accent);text-decoration:none;font-family:'IBM Plex Mono',monospace;font-size:.72rem}
.cdetails strong{color:var(--text);font-size:.65rem;text-transform:uppercase;letter-spacing:1px}
.drow{margin-top:.35rem}
.srow{display:flex;gap:.35rem;margin-top:.6rem;flex-wrap:wrap}
.stbtn{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:1px;text-transform:uppercase;padding:.18rem .45rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:2px}
.stbtn.ak{border-color:#0066ff;color:#0066ff;background:rgba(0,102,255,.1)}
.stbtn.aa{border-color:#cc00ff;color:#cc00ff;background:rgba(204,0,255,.1)}
.stbtn.ax{border-color:var(--waescherei);color:var(--waescherei);background:rgba(0,204,136,.1)}
.narea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:.76rem;padding:.4rem .55rem;border-radius:2px;margin-top:.45rem;resize:none;height:52px;outline:none}
.nbtn{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:1px;text-transform:uppercase;padding:.25rem .6rem;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;border-radius:2px;margin-top:.25rem}
.wholine{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--muted);margin-top:.25rem}
.ebtn{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:1px;text-transform:uppercase;padding:.3rem .7rem;border:none;background:#1a3a1a;color:#00cc88;cursor:pointer;border-radius:2px;margin-top:.5rem;width:100%;text-align:left}
.ebtn:hover{background:#00cc88;color:#0a0c0f}
footer{padding:1.2rem;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--muted);border-top:1px solid var(--border)}
footer span{color:var(--accent)}
.toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--accent2);color:var(--accent2);font-family:'IBM Plex Mono',monospace;font-size:.7rem;padding:.45rem 1rem;border-radius:2px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
</style>

var currentUser='', sharedData={}, currentFilter='all', currentSearch='';

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}

function setSS(type,txt){
  var d=document.getElementById('sdot'),t=document.getElementById('stxt');
  if(!d)return;
  d.className='dot'+(type==='s'?' pulse':type==='e'?' err':'');
  t.textContent=txt;
  t.style.color=type==='e'?'#ff3333':type==='s'?'var(--accent2)':'var(--waescherei)';
}

function startSync(){
  setSS('s','Pripája sa...');
  db.collection('striker').doc('crm').onSnapshot(function(snap){
    sharedData=snap.exists?snap.data():{};
    setSS('ok','Live ●');
    var d=new Date();
    document.getElementById('stime').textContent=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
    render();
  },function(err){setSS('e','Chyba');console.error(err)});
}

function saveToFB(id,data){
  setSS('s','Ukladá...');
  db.collection('striker').doc('crm').set(Object.assign({},sharedData,{[id]:data}))
  .then(function(){setSS('ok','Live ●')})
  .catch(function(){setSS('e','Chyba');showToast('⚠ Uloženie zlyhalo')});
}

function startAs(name){
  currentUser=name;
  localStorage.setItem('striker-user',name);
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('ulabel').textContent=name;
  startSync();
}

function startCustom(){var n=document.getElementById('cname').value.trim();if(n)startAs(n)}

function logout(){
  localStorage.removeItem('striker-user');
  document.getElementById('setup').style.display='flex';
  document.getElementById('app').style.display='none';
}

function setStatus(id,s){
  if(!sharedData[id])sharedData[id]={};
  sharedData[id].status=sharedData[id].status===s?'':s;
  sharedData[id].who=currentUser;
  saveToFB(id,sharedData[id]);
  render();
}

function saveNote(id){
  var ta=document.querySelector('.narea[data-id="'+id+'"]');
  if(!ta)return;
  if(!sharedData[id])sharedData[id]={};
  sharedData[id].notes=ta.value;
  sharedData[id].noteWho=currentUser;
  saveToFB(id,sharedData[id]);
  showToast('✓ Poznámka uložená');
}

    body:'Sehr geehrte Damen und Herren,\n\nmein Name ist Adolf Staubert, ich bin Entwickler einer patentierten industriellen Heiztechnologie namens STRIKER.\n\nIndustriewäschereien gehören zu den energieintensivsten Betrieben – unser System kann Ihren Wärmeenergiebedarf drastisch senken.\n\nBei 45 kW elektrischer Leistung erzeugt STRIKER 120–160 kW Wärme. Das bedeutet bis zu 70% weniger Heizkosten.\n\nPreis: ab 8.000 EUR, Lieferzeit 6–8 Wochen.\n\nDarf ich Sie kurz telefonisch kontaktieren?\n\nMit freundlichen Grüßen\nAdolf Staubert\nSTRIKER Wärmetechnologie\nTel: +49 171 4758126\nE-Mail: info@striker-energy.de'
  };
}

function sendEmail(id){
  var c=contacts[parseInt(id)];
  var tpl=getTemplate(c);
  var btn=document.querySelector('.ebtn[data-id="'+id+'"]');
  if(btn){btn.textContent='⏳ Odosiela sa...';btn.disabled=true;}
  fetch('/.netlify/functions/send-email',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({to:c.e,subject:tpl.subject,message:tpl.body})
  }).then(function(r){return r.json()}).then(function(result){
    if(result.success){
      showToast('✓ Email odoslaný na '+(result.sentTo||c.e));
      setStatus(id,'k');
      if(btn){btn.textContent='✓ Odoslaný';btn.style.background='rgba(0,204,136,.2)';btn.style.color='var(--waescherei)';}
    }else{
      showToast('⚠ Chyba: '+(result.error||'Neznáma chyba'));
      if(btn){btn.textContent='📧 Email odoslať';btn.disabled=false;}
    }
  }).catch(function(){
    showToast('⚠ Spojenie zlyhalo');
    if(btn){btn.textContent='📧 Email odoslať';btn.disabled=false;}
  });
}

function toggleCard(el){el.closest('.contact').classList.toggle('open')}

function render(){
  var list=document.getElementById('list');
  if(!list)return;
  var arr=contacts.filter(function(c){
    if(currentFilter!=='all'&&c.t!==currentFilter)return false;
    if(currentSearch){var q=currentSearch.toLowerCase();return c.n.toLowerCase().includes(q)||c.c.toLowerCase().includes(q);}
    return true;
  });
  var hotels=arr.filter(function(c){return c.t==='hotel'});
  var waesch=arr.filter(function(c){return c.t==='waescherei'});
  var html='';
  if(hotels.length){html+='<div class="slabel">Hotely ('+hotels.length+')</div>';hotels.forEach(function(c){html+=cardHtml(c)});}
  if(waesch.length){html+='<div class="slabel">Práčovne ('+waesch.length+')</div>';waesch.forEach(function(c){html+=cardHtml(c)});}
  if(!html)html='<div style="text-align:center;padding:2.5rem;color:var(--muted);font-size:.8rem">Žiadne výsledky</div>';
  list.innerHTML=html;
}

function cardHtml(c){
  var id=contacts.indexOf(c).toString();
  var d=sharedData[id]||{};
  var st=d.status||'';
  var notes=d.notes||'';
  var who=d.who||'';
  var sb=st?'<span class="sbadge s'+st+'">'+(st==='k'?'Kontaktovaný':st==='a'?'Ponuka':'Uzavreté')+'</span>':'';
  var el=c.t==='hotel'?'📧 Email odoslať (Hotel)':'📧 Email odoslať (Práčovňa)';
  return '<div class="contact '+c.t+'">'+
    '<div class="cleft" onclick="toggleCard(this)">'+
    '<div class="cname">'+c.n+sb+'</div>'+
    '<div class="ccity">'+c.c+'</div>'+
    '<div class="cdetails">'+
    '<div class="drow"><strong>Adresa</strong><br>'+c.a+'</div>'+
    '<div class="drow"><strong>Tel</strong><br><a href="tel:'+c.p+'">'+c.p+'</a></div>'+
    '<div class="drow"><strong>E-Mail</strong><br><a href="mailto:'+c.e+'">'+c.e+'</a></div>'+
    '<div class="drow"><strong>Web</strong><br><a href="https://'+c.w+'" target="_blank">'+c.w+'</a></div>'+
    '<button class="ebtn" data-id="'+id+'" onclick="event.stopPropagation();sendEmail(\''+id+'\')">'+el+'</button>'+
    '<div class="srow">'+
    '<button class="stbtn'+(st==='k'?' ak':'')+'" onclick="event.stopPropagation();setStatus(\''+id+'\',\'k\')">Kontaktovaný</button>'+
    '<button class="stbtn'+(st==='a'?' aa':'')+'" onclick="event.stopPropagation();setStatus(\''+id+'\',\'a\')">Ponuka</button>'+
    '<button class="stbtn'+(st==='x'?' ax':'')+'" onclick="event.stopPropagation();setStatus(\''+id+'\',\'x\')">Uzavreté</button>'+
    '</div>'+
    (who?'<div class="wholine">Status: '+who+'</div>':'')+
    '<textarea class="narea" data-id="'+id+'" placeholder="Poznámky..." onclick="event.stopPropagation()">'+notes+'</textarea>'+
    '<button class="nbtn" onclick="event.stopPropagation();saveNote(\''+id+'\')">Uložiť poznámku</button>'+
    '</div></div>'+
    '<span class="cbadge '+c.t+'">'+(c.t==='hotel'?'Hotel':'Práč.')+'</span>'+
    '</div>';
}

document.getElementById('search').addEventListener('input',function(e){currentSearch=e.target.value;render()});
document.querySelectorAll('.fbtn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active')});
    btn.classList.add('active');currentFilter=btn.dataset.f;render();
  });
});
document.getElementById('cname').addEventListener('keydown',function(e){if(e.key==='Enter')startCustom()});

var savedUser=localStorage.getItem('striker-user');
if(savedUser)startAs(savedUser);
</script>
</body>
</html>
